<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Order Receipt – Ignite '26</title>
  <meta name="description" content="Your food order receipt for Ignite '26. Enjoy your meal!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* Receipt Specific Styles */
    .receipt-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      background: var(--bg-deep);
      position: relative;
      overflow: hidden;
    }

    .receipt-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow-card);
      position: relative;
      z-index: 10;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .receipt-header {
      text-align: center;
      margin-bottom: 25px;
      border-bottom: 2px dashed var(--glass-border);
      padding-bottom: 20px;
    }

    .receipt-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .receipt-logo img {
      width: 50px;
      height: 50px;
    }

    .receipt-logo .logo-text {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
    }

    .receipt-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .order-id {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .receipt-body {
      margin-bottom: 25px;
    }

    .items-list {
      margin: 20px 0;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .item-name {
      color: var(--text-primary);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-price {
      color: var(--text-primary);
      font-weight: 600;
      font-family: var(--font-body);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid var(--text-primary);
    }

    .total-label {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .total-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: #34d399;
    }

    .receipt-qr {
      text-align: center;
      margin: 25px 0;
      padding: 15px;
      background: #fff;
      border-radius: var(--radius-md);
      display: inline-block;
      width: 120px;
      height: 120px;
      margin-left: auto;
      margin-right: auto;
      display: block;
    }

    .receipt-qr img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .receipt-footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.5;
      font-family: var(--font-body);
    }

    .receipt-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
      border-top: 1px solid var(--glass-border);
      padding-top: 20px;
    }

    .btn-print {
      background: var(--gradient-primary);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition-smooth);
      font-family: var(--font-body);
    }

    .btn-home {
      background: var(--glass);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: var(--transition-smooth);
      font-family: var(--font-body);
    }

    .btn-print:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .btn-home:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-cyan);
    }

    .receipt-bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.12) 0%, transparent 70%);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    /* Print Styles */
    @media print {

      .navbar,
      .footer,
      .receipt-actions,
      .receipt-bg-glow,
      .floating-cart,
      .orb {
        display: none !important;
      }

      body {
        background: white !important;
        color: black !important;
      }

      .receipt-container {
        padding: 0 !important;
        background: white !important;
        min-height: auto !important;
      }

      .receipt-card {
        box-shadow: none !important;
        border: 1px solid #000 !important;
        background: white !important;
        backdrop-filter: none !important;
        color: black !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 20px !important;
      }

      .receipt-title,
      .total-label,
      .item-name,
      .item-price,
      .logo-text {
        color: black !important;
      }

      .total-value {
        color: #000 !important;
        border-top: 2px solid #000;
        border-bottom: 2px solid #000;
      }

      .receipt-header {
        border-bottom: 2px dashed #000 !important;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="Ignite Logo" width="50px" height="50px">
        <span class="logo-text">IGNITE<span class="logo-accent">'26</span></span>
      </a>
    </div>
  </nav>

  <main class="receipt-container">
    <div class="receipt-bg-glow"></div>

    <div class="receipt-card" id="receipt-content">
      <div class="receipt-header">
        <div class="receipt-logo">
          <img src="logo.png" alt="Ignite Logo">
          <span class="logo-text">IGNITE<span class="logo-accent">'26</span></span>
        </div>
        <h2 class="receipt-title">Food Stalls Receipt</h2>
        <p class="order-id">ORDER ID: <span id="o-id">FOOD-XXXXXX</span></p>
      </div>

      <div class="receipt-body">
        <div class="items-list" id="o-items">
          <!-- Items will be injected here -->
        </div>

        <div class="total-row">
          <span class="total-label">Subtotal</span>
          <span class="total-value" id="o-total">₹0</span>
        </div>
      </div>

      <div class="receipt-qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=FOOD-ORDER" alt="QR Code" id="o-qr">
      </div>

      <div class="receipt-footer">
        <p>Show this code at the food stall to collect your order.</p>
        <p>Thank you for choosing Ignite Stalls!</p>
      </div>

      <div class="receipt-actions">
        <button class="btn-print" onclick="window.print()">
          <i class="fas fa-print"></i> Print Token
        </button>
        <a href="food-stalls.html" class="btn-home">
          <i class="fas fa-utensils"></i> Order More
        </a>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" id="contact" style="margin-top: 50px;">
    <div class="container">
      <div class="footer-bottom" style="text-align: center; padding: 40px 0; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 College Fest – Ignite the Future. All rights reserved.</p>
        <p>Crafted with passion <img src="logo.png" alt="logo" width="20px" height="20px" style="display:inline-block; vertical-align:middle; margin: 0 4px;"> by Student Council</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="receipts.js"></script>
</body>

</html>
